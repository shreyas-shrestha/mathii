<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mathii</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <style>
    :root {
      --bg: #f5f5f3;
      --bg-elevated: rgba(255, 255, 255, 0.88);
      --panel: #ffffff;
      --panel-muted: #f2f2ef;
      --text: #171717;
      --text-muted: #6a6a66;
      --border: rgba(23, 23, 23, 0.08);
      --border-strong: rgba(23, 23, 23, 0.14);
      --accent: #111111;
      --accent-soft: rgba(17, 17, 17, 0.07);
      --success: #177245;
      --danger: #be3f35;
      --danger-soft: rgba(190, 63, 53, 0.08);
      --shadow: 0 18px 40px rgba(15, 15, 15, 0.08);
      --radius-lg: 28px;
      --radius-md: 20px;
      --radius-sm: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "DM Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top center, rgba(0, 0, 0, 0.035), transparent 26%),
        linear-gradient(180deg, #f7f7f4 0%, #efefeb 100%);
    }

    button,
    select,
    textarea {
      font: inherit;
    }

    button,
    select {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.6;
    }

    .app-shell {
      min-height: 100vh;
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 20px 0 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      display: grid;
      place-items: center;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.95rem;
    }

    .topbar-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .selector {
      min-width: 140px;
      padding: 10px 38px 10px 14px;
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(244, 244, 241, 0.92));
      background-image:
        linear-gradient(45deg, transparent 50%, var(--text-muted) 50%),
        linear-gradient(135deg, var(--text-muted) 50%, transparent 50%);
      background-position:
        calc(100% - 18px) calc(50% - 2px),
        calc(100% - 13px) calc(50% - 2px);
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      color: var(--text);
    }

    .view {
      flex: 1;
      display: none;
    }

    .view.active {
      display: flex;
    }

    .landing {
      align-items: center;
      justify-content: center;
      padding: 4vh 0 9vh;
    }

    .landing-inner {
      width: min(860px, 100%);
      display: grid;
      gap: 28px;
    }

    .hero-mark {
      display: grid;
      gap: 18px;
      justify-items: center;
      text-align: center;
    }

    .hero-logo {
      width: 72px;
      height: 72px;
      border-radius: 24px;
      background: linear-gradient(180deg, #1f1f1f, #090909);
      color: #ffffff;
      display: grid;
      place-items: center;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.05em;
      box-shadow: 0 16px 36px rgba(17, 17, 17, 0.16);
    }

    .hero-title {
      margin: 0;
      font-size: clamp(2.5rem, 7vw, 4.6rem);
      line-height: 0.96;
      letter-spacing: -0.05em;
    }

    .composer {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .composer-textarea {
      width: 100%;
      min-height: 146px;
      resize: none;
      border: 0;
      outline: none;
      padding: 10px 8px 4px;
      background: transparent;
      color: var(--text);
      font-size: 1.08rem;
      line-height: 1.6;
    }

    .composer-textarea::placeholder {
      color: #868680;
    }

    .composer-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .composer-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .submit-btn {
      min-width: 106px;
      border: 0;
      border-radius: 999px;
      padding: 11px 18px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      letter-spacing: -0.01em;
      box-shadow: 0 10px 24px rgba(17, 17, 17, 0.12);
    }

    .result-view {
      flex-direction: column;
      gap: 18px;
      padding-top: 6px;
    }

    .thread {
      display: grid;
      gap: 18px;
    }

    .message-row {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .avatar {
      width: 36px;
      height: 36px;
      flex: 0 0 36px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 0.95rem;
      font-weight: 700;
      background: var(--panel-muted);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .avatar.brand-avatar {
      background: var(--accent);
      color: #fff;
      border-color: rgba(17, 17, 17, 0.18);
    }

    .bubble {
      flex: 1;
      min-width: 0;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 18px 18px 16px;
    }

    .bubble.user {
      background: var(--panel);
    }

    .prompt-text {
      margin: 0;
      color: var(--text);
      font-size: 1rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .result-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      border: 1px solid rgba(17, 17, 17, 0.08);
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 600;
    }

    .status-pill.failed {
      background: var(--danger-soft);
      border-color: rgba(190, 63, 53, 0.18);
      color: var(--danger);
    }

    .status-pill.done {
      background: rgba(23, 114, 69, 0.08);
      border-color: rgba(23, 114, 69, 0.14);
      color: var(--success);
    }

    .pulse {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }

    .pulse span {
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: currentColor;
      animation: pulse 1s infinite ease-in-out;
    }

    .pulse span:nth-child(2) { animation-delay: 0.12s; }
    .pulse span:nth-child(3) { animation-delay: 0.24s; }

    .meta-strip {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .meta-chip {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel-muted);
      color: var(--text-muted);
      padding: 8px 12px;
      font-size: 0.86rem;
      font-family: "JetBrains Mono", monospace;
    }

    .preview-stage {
      border-radius: 22px;
      border: 1px solid var(--border);
      background: #111;
      overflow: hidden;
      min-height: 280px;
      display: grid;
      place-items: center;
    }

    .preview-stage.empty {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)),
        #191919;
      color: rgba(255, 255, 255, 0.68);
      font-family: "JetBrains Mono", monospace;
      font-size: 0.9rem;
      text-align: center;
      padding: 24px;
    }

    video {
      display: block;
      width: 100%;
      background: #000;
    }

    .error-banner {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid rgba(190, 63, 53, 0.18);
      background: var(--danger-soft);
      color: var(--danger);
      white-space: pre-wrap;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.88rem;
      line-height: 1.6;
    }

    .details-stack {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    details {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--panel);
      overflow: hidden;
    }

    summary {
      cursor: pointer;
      list-style: none;
      padding: 14px 16px;
      font-weight: 600;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    pre {
      margin: 0;
      padding: 0 16px 16px;
      overflow: auto;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    code {
      font-family: "JetBrains Mono", monospace;
    }

    .result-composer {
      margin-top: auto;
      position: sticky;
      bottom: 0;
      padding-top: 6px;
      background: linear-gradient(180deg, rgba(245,245,243,0), rgba(245,245,243,0.92) 28%, rgba(245,245,243,1));
    }

    .assistive-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 0.88rem;
      min-height: 20px;
    }

    .hidden {
      display: none !important;
    }

    @keyframes pulse {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
      40% { transform: translateY(-3px); opacity: 1; }
    }

    @media (max-width: 768px) {
      .app-shell {
        width: min(100vw - 20px, 100%);
        padding: 14px 0 24px;
        gap: 18px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .topbar-controls,
      .composer-footer,
      .composer-actions {
        width: 100%;
      }

      .selector,
      .submit-btn {
        flex: 1 1 0;
        min-width: 0;
      }

      .hero-logo {
        width: 64px;
        height: 64px;
        border-radius: 22px;
      }

      .bubble {
        padding: 16px;
        border-radius: 20px;
      }

      .preview-stage {
        min-height: 220px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">M</div>
        <span>Mathii</span>
      </div>
      <div class="topbar-controls">
        <select id="provider" class="selector" aria-label="Model selector"></select>
        <select id="quality" class="selector" aria-label="Reasoning quality selector">
          <option value="l">Fast</option>
          <option value="m">Balanced</option>
          <option value="h">Deep</option>
        </select>
      </div>
    </header>

    <main id="landingView" class="view landing active">
      <div class="landing-inner">
        <div class="hero-mark">
          <div class="hero-logo">M</div>
          <h1 class="hero-title">Mathii</h1>
        </div>

        <section class="composer" aria-label="Prompt composer">
          <textarea
            id="prompt"
            class="composer-textarea"
            placeholder="Animate the derivative of x^2"
          ></textarea>
          <div class="composer-footer">
            <div id="providerHint" class="assistive-row">Loading models…</div>
            <div class="composer-actions">
              <button id="generateBtn" class="submit-btn">Generate</button>
            </div>
          </div>
        </section>
      </div>
    </main>

    <main id="resultView" class="view result-view">
      <section class="thread">
        <div class="message-row">
          <div class="avatar">You</div>
          <div class="bubble user">
            <p id="resultPrompt" class="prompt-text"></p>
          </div>
        </div>

        <div class="message-row">
          <div class="avatar brand-avatar">M</div>
          <div class="bubble">
            <div class="result-header">
              <h2 class="result-title">Mathii</h2>
              <div id="statusPill" class="status-pill">
                <div class="pulse" aria-hidden="true">
                  <span></span><span></span><span></span>
                </div>
                <span id="statusText">Queued</span>
              </div>
            </div>

            <div class="meta-strip">
              <div class="meta-chip">Model: <span id="selectedModel">-</span></div>
              <div class="meta-chip">Reasoning: <span id="selectedReasoning">-</span></div>
              <div class="meta-chip">Attempts: <span id="attempts">0 / 3</span></div>
              <div class="meta-chip">Time: <span id="renderTime">0.0s</span></div>
            </div>

            <div id="previewStage" class="preview-stage empty">
              <div id="previewPlaceholder">Waiting for animation…</div>
              <video id="videoPlayer" controls class="hidden"></video>
            </div>

            <div id="errorBanner" class="error-banner"></div>

            <div id="detailsStack" class="details-stack hidden">
              <details id="codePanel" hidden>
                <summary>Generated Code</summary>
                <pre><code id="codeBlock" class="language-python"></code></pre>
              </details>
            </div>
          </div>
        </div>
      </section>

      <section class="result-composer">
        <section class="composer" aria-label="Prompt composer">
          <textarea
            id="followupPrompt"
            class="composer-textarea"
            placeholder="Show how the quadratic formula works"
          ></textarea>
          <div class="composer-footer">
            <div class="assistive-row"></div>
            <div class="composer-actions">
              <button id="followupBtn" class="submit-btn">Generate</button>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    const state = {
      mode: "landing",
      providers: [],
      currentPrompt: "",
      activeJobId: null,
      status: "idle",
      attempts: 0,
      renderTimeSeconds: 0,
      errorMessage: "",
      manimCode: "",
      videoUrl: "",
    };

    const els = {
      landingView: document.getElementById("landingView"),
      resultView: document.getElementById("resultView"),
      prompt: document.getElementById("prompt"),
      followupPrompt: document.getElementById("followupPrompt"),
      provider: document.getElementById("provider"),
      quality: document.getElementById("quality"),
      providerHint: document.getElementById("providerHint"),
      generateBtn: document.getElementById("generateBtn"),
      followupBtn: document.getElementById("followupBtn"),
      resultPrompt: document.getElementById("resultPrompt"),
      statusPill: document.getElementById("statusPill"),
      statusText: document.getElementById("statusText"),
      selectedModel: document.getElementById("selectedModel"),
      selectedReasoning: document.getElementById("selectedReasoning"),
      attempts: document.getElementById("attempts"),
      renderTime: document.getElementById("renderTime"),
      previewStage: document.getElementById("previewStage"),
      previewPlaceholder: document.getElementById("previewPlaceholder"),
      videoPlayer: document.getElementById("videoPlayer"),
      errorBanner: document.getElementById("errorBanner"),
      detailsStack: document.getElementById("detailsStack"),
      codePanel: document.getElementById("codePanel"),
      codeBlock: document.getElementById("codeBlock"),
    };

    const statusLabels = {
      idle: "Idle",
      queued: "Queued",
      generating: "Generating",
      rendering: "Rendering",
      done: "Done",
      failed: "Failed",
    };

    const qualityLabels = {
      l: "Fast",
      m: "Balanced",
      h: "Deep",
    };

    function truncateError(message) {
      return (message || "")
        .split("\n")
        .filter(Boolean)
        .slice(0, 3)
        .join("\n");
    }

    function setMode(mode) {
      state.mode = mode;
      els.landingView.classList.toggle("active", mode === "landing");
      els.resultView.classList.toggle("active", mode === "result");
    }

    function updateStatus(status) {
      state.status = status;
      const label = statusLabels[status] || status;
      els.statusText.textContent = label;
      els.statusPill.classList.toggle("done", status === "done");
      els.statusPill.classList.toggle("failed", status === "failed");
    }

    function syncPromptFields(activeValue) {
      els.prompt.value = activeValue;
      els.followupPrompt.value = activeValue;
    }

    function setBusy(isBusy) {
      els.generateBtn.disabled = isBusy;
      els.followupBtn.disabled = isBusy;
      els.provider.disabled = isBusy || !state.providers.length;
      els.quality.disabled = isBusy;
    }

    function resetResultState() {
      state.activeJobId = null;
      state.attempts = 0;
      state.renderTimeSeconds = 0;
      state.errorMessage = "";
      state.manimCode = "";
      state.videoUrl = "";

      els.attempts.textContent = "0 / 3";
      els.renderTime.textContent = "0.0s";
      els.errorBanner.style.display = "none";
      els.errorBanner.textContent = "";
      els.videoPlayer.pause();
      els.videoPlayer.removeAttribute("src");
      els.videoPlayer.load();
      els.videoPlayer.classList.add("hidden");
      els.previewStage.classList.add("empty");
      els.previewPlaceholder.textContent = "Waiting for animation…";
      els.previewPlaceholder.classList.remove("hidden");
      els.detailsStack.classList.add("hidden");
      els.codePanel.hidden = true;
      els.codeBlock.textContent = "";
    }

    function renderState() {
      els.selectedModel.textContent = els.provider.value || "-";
      els.selectedReasoning.textContent = qualityLabels[els.quality.value] || els.quality.value;
      els.attempts.textContent = `${state.attempts} / 3`;
      els.renderTime.textContent = `${(state.renderTimeSeconds || 0).toFixed(1)}s`;
      els.resultPrompt.textContent = state.currentPrompt;

      if (state.manimCode) {
        els.codeBlock.textContent = state.manimCode;
        hljs.highlightElement(els.codeBlock);
        els.detailsStack.classList.remove("hidden");
        els.codePanel.hidden = false;
      }

      if (state.videoUrl) {
        els.videoPlayer.src = state.videoUrl;
        els.videoPlayer.classList.remove("hidden");
        els.previewStage.classList.remove("empty");
        els.previewPlaceholder.classList.add("hidden");
      }

      if (state.errorMessage) {
        els.errorBanner.style.display = "block";
        els.errorBanner.textContent = truncateError(state.errorMessage);
      }
    }

    async function loadProviders() {
      const response = await fetch("/api/providers");
      const data = await response.json();
      state.providers = data.providers || [];
      els.provider.innerHTML = "";

      if (!state.providers.length) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "No models";
        els.provider.appendChild(option);
        els.provider.disabled = true;
        els.generateBtn.disabled = true;
        els.followupBtn.disabled = true;
        els.providerHint.textContent = "No providers configured";
        return;
      }

      state.providers.forEach((provider) => {
        const option = document.createElement("option");
        option.value = provider;
        option.textContent = provider;
        els.provider.appendChild(option);
      });

      els.provider.disabled = false;
      els.generateBtn.disabled = false;
      els.followupBtn.disabled = false;
      els.providerHint.textContent = `${state.providers.length} model${state.providers.length > 1 ? "s" : ""}`;
      renderState();
    }

    async function pollStatus(jobId) {
      while (state.activeJobId === jobId) {
        const response = await fetch(`/api/status/${jobId}`);
        const data = await response.json();

        updateStatus(data.status);
        state.attempts = data.attempts || 0;
        state.renderTimeSeconds = data.render_time_seconds || 0;
        state.errorMessage = data.error_message || "";
        state.manimCode = data.manim_code || "";
        state.videoUrl = data.video_url || "";
        renderState();

        if (data.status === "failed" || data.status === "done") {
          setBusy(false);
          if (data.status === "done") {
            els.followupPrompt.focus();
          }
          return;
        }

        await new Promise((resolve) => setTimeout(resolve, 1200));
      }
    }

    async function submitPrompt(prompt) {
      const trimmedPrompt = prompt.trim();
      if (trimmedPrompt.length < 10) {
        els.errorBanner.style.display = "block";
        els.errorBanner.textContent = "Prompt must be at least 10 characters.";
        setMode("result");
        state.currentPrompt = trimmedPrompt || " ";
        resetResultState();
        updateStatus("failed");
        renderState();
        return;
      }

      state.currentPrompt = trimmedPrompt;
      syncPromptFields(trimmedPrompt);
      setMode("result");
      resetResultState();
      updateStatus("queued");
      renderState();
      setBusy(true);

      const response = await fetch("/api/generate-async", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          prompt: trimmedPrompt,
          provider: els.provider.value || null,
          quality: els.quality.value,
        }),
      });

      if (!response.ok) {
        const message = await response.text();
        updateStatus("failed");
        state.errorMessage = message;
        renderState();
        setBusy(false);
        return;
      }

      const job = await response.json();
      state.activeJobId = job.job_id;
      updateStatus(job.status || "queued");
      renderState();
      await pollStatus(job.job_id);
    }

    function bindComposer(textarea, button) {
      button.addEventListener("click", async () => {
        await submitPrompt(textarea.value);
      });

      textarea.addEventListener("keydown", async (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          await submitPrompt(textarea.value);
        }
      });
    }

    bindComposer(els.prompt, els.generateBtn);
    bindComposer(els.followupPrompt, els.followupBtn);

    loadProviders().catch((error) => {
      els.providerHint.textContent = "Failed to load models";
      setMode("result");
      state.currentPrompt = "";
      resetResultState();
      updateStatus("failed");
      state.errorMessage = error.message;
      renderState();
      setBusy(false);
    });
  </script>
</body>
</html>
