<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mathii</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --bg-secondary: #f4f4f4;
      --sidebar-bg: #171717;
      --sidebar-text: #ececec;
      --sidebar-muted: #8e8ea0;
      --text-primary: #0d0d0d;
      --text-secondary: #6e6e80;
      --border: rgba(0, 0, 0, 0.08);
      --user-bubble: #f4f4f4;
      --accent: #10a37f;
      --accent-fg: #ffffff;
      --danger: #ef4444;
      --mono: "JetBrains Mono", monospace;
      --sans: "Inter", system-ui, sans-serif;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        --bg: #212121;
        --bg-secondary: #2f2f2f;
        --text-primary: #ececec;
        --text-secondary: #8e8ea0;
        --border: rgba(255, 255, 255, 0.08);
        --user-bubble: #2f2f2f;
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      }
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text-primary);
    }

    button,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      min-height: 100vh;
      background: var(--bg);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 18px 14px 14px;
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      border-right: 1px solid rgba(255, 255, 255, 0.06);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 6px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .brand-mark {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.08);
      color: var(--sidebar-text);
      font-family: var(--mono);
      font-size: 0.95rem;
      font-weight: 500;
    }

    .sidebar-button {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--sidebar-text);
      padding: 11px 14px;
      text-align: left;
      font-size: 0.95rem;
      transition: background 140ms ease, border-color 140ms ease;
    }

    .sidebar-button:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.14);
    }

    .history {
      display: grid;
      gap: 6px;
      align-content: start;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }

    .history-item {
      display: grid;
      gap: 3px;
      padding: 10px 12px;
      border-radius: 12px;
      color: var(--sidebar-text);
      background: transparent;
      border: 1px solid transparent;
    }

    .history-item:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.04);
    }

    .history-title {
      font-size: 0.9rem;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-meta {
      font-size: 0.76rem;
      color: var(--sidebar-muted);
      line-height: 1.2;
    }

    .sidebar-footer {
      margin-top: auto;
      display: grid;
      gap: 12px;
      padding-top: 8px;
    }

    .selector-group {
      display: grid;
      gap: 6px;
    }

    .selector-label {
      font-size: 0.75rem;
      color: var(--sidebar-muted);
      letter-spacing: 0.01em;
    }

    .sidebar-select {
      width: 100%;
      appearance: none;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.03));
      color: var(--sidebar-text);
      padding: 11px 36px 11px 12px;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--sidebar-muted) 50%),
        linear-gradient(135deg, var(--sidebar-muted) 50%, transparent 50%);
      background-position:
        calc(100% - 18px) calc(50% - 2px),
        calc(100% - 13px) calc(50% - 2px);
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
    }

    .provider-hint {
      font-size: 0.75rem;
      color: var(--sidebar-muted);
      min-height: 1em;
    }

    .main {
      min-width: 0;
      background: var(--bg);
    }

    .main-shell {
      max-width: 720px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0 20px;
    }

    .thread-wrap {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 36px 0 180px;
      scroll-behavior: smooth;
    }

    .thread {
      display: grid;
      gap: 20px;
    }

    .thread-empty {
      min-height: calc(100vh - 280px);
      display: grid;
      place-items: center;
      color: var(--text-secondary);
      font-size: 0.98rem;
    }

    .message-row {
      display: flex;
      width: 100%;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.assistant {
      justify-content: flex-start;
    }

    .user-bubble {
      max-width: min(88%, 640px);
      border-radius: 22px;
      background: var(--user-bubble);
      color: var(--text-primary);
      padding: 14px 16px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid var(--border);
    }

    .assistant-shell {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      width: 100%;
      max-width: 100%;
    }

    .assistant-avatar {
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      font-family: var(--mono);
      font-size: 0.82rem;
      font-weight: 500;
      margin-top: 2px;
    }

    .assistant-bubble {
      min-width: 0;
      flex: 1;
      padding-top: 1px;
    }

    .status-line {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-primary);
      font-size: 0.96rem;
      font-weight: 500;
      min-height: 24px;
    }

    .status-pulse {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--accent);
    }

    .status-pulse span {
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: currentColor;
      animation: bounce 1s infinite ease-in-out;
    }

    .status-pulse span:nth-child(2) {
      animation-delay: 0.12s;
    }

    .status-pulse span:nth-child(3) {
      animation-delay: 0.24s;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .meta-chip {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      padding: 6px 10px;
      font-family: var(--mono);
      font-size: 0.74rem;
      line-height: 1;
    }

    .preview-card {
      margin-top: 16px;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      display: grid;
      place-items: center;
    }

    .preview-card.placeholder {
      color: var(--text-secondary);
      font-size: 0.92rem;
    }

    .preview-card video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    .inline-error {
      display: none;
      margin-top: 14px;
      border-radius: 14px;
      border: 1px solid rgba(239, 68, 68, 0.25);
      background: rgba(239, 68, 68, 0.08);
      color: var(--danger);
      padding: 12px 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      font-family: var(--mono);
      font-size: 0.82rem;
    }

    .assistant-details {
      margin-top: 14px;
    }

    details {
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: var(--bg-secondary);
    }

    summary {
      cursor: pointer;
      list-style: none;
      padding: 13px 14px;
      font-size: 0.9rem;
      font-weight: 500;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    pre {
      margin: 0;
      padding: 0 14px 14px;
      overflow: auto;
      font-family: var(--mono);
      font-size: 0.84rem;
      line-height: 1.6;
    }

    code {
      font-family: var(--mono);
    }

    .composer-wrap {
      position: sticky;
      bottom: 0;
      padding: 18px 0 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, var(--bg) 36%);
    }

    @media (prefers-color-scheme: dark) {
      .composer-wrap {
        background:
          linear-gradient(180deg, rgba(33, 33, 33, 0) 0%, var(--bg) 36%);
      }
    }

    .composer {
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--bg);
      box-shadow: var(--shadow);
      padding: 12px 12px 12px 16px;
    }

    .composer-inner {
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }

    .composer-input {
      width: 100%;
      min-height: 24px;
      max-height: 200px;
      resize: none;
      overflow-y: auto;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text-primary);
      line-height: 1.55;
      padding: 6px 0;
      font-size: 1rem;
    }

    .composer-input::placeholder {
      color: var(--text-secondary);
    }

    .send-btn {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border-radius: 999px;
      border: 0;
      display: grid;
      place-items: center;
      background: var(--sidebar-bg);
      color: var(--accent-fg);
      transition: opacity 140ms ease, transform 140ms ease;
    }

    .send-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .send-btn .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-top-color: var(--accent-fg);
      animation: spin 0.75s linear infinite;
    }

    .send-btn.loading .send-icon {
      display: none;
    }

    .send-btn.loading .spinner {
      display: block;
    }

    .hidden {
      display: none !important;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: translateY(0);
        opacity: 0.35;
      }
      40% {
        transform: translateY(-4px);
        opacity: 1;
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 880px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        gap: 14px;
        border-right: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .history {
        grid-auto-flow: column;
        grid-auto-columns: minmax(180px, 1fr);
        overflow-x: auto;
        overflow-y: hidden;
      }

      .sidebar-footer {
        grid-template-columns: 1fr 1fr;
        align-items: end;
      }
    }

    @media (max-width: 640px) {
      .main-shell {
        padding: 0 14px;
      }

      .thread-wrap {
        padding-top: 20px;
        padding-bottom: 168px;
      }

      .sidebar-footer {
        grid-template-columns: 1fr;
      }

      .composer {
        border-radius: 20px;
      }

      .user-bubble {
        max-width: 94%;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">M</div>
        <span>Mathii</span>
      </div>

      <button id="newAnimationBtn" class="sidebar-button" type="button">New animation</button>

      <div class="history" aria-label="Example prompts">
        <div class="history-item">
          <div class="history-title">Animate the derivative of x^2</div>
          <div class="history-meta">Derivative</div>
        </div>
        <div class="history-item">
          <div class="history-title">Show how the quadratic formula works</div>
          <div class="history-meta">Algebra</div>
        </div>
        <div class="history-item">
          <div class="history-title">Visualize a sine wave transformation</div>
          <div class="history-meta">Trigonometry</div>
        </div>
        <div class="history-item">
          <div class="history-title">Explain matrix multiplication step by step</div>
          <div class="history-meta">Linear algebra</div>
        </div>
      </div>

      <div class="sidebar-footer">
        <div class="selector-group">
          <label class="selector-label" for="provider">Model</label>
          <select id="provider" class="sidebar-select"></select>
          <div id="providerHint" class="provider-hint">Loading models…</div>
        </div>

        <div class="selector-group">
          <label class="selector-label" for="quality">Reasoning</label>
          <select id="quality" class="sidebar-select">
            <option value="l">Fast</option>
            <option value="m">Balanced</option>
            <option value="h">Deep</option>
          </select>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="main-shell">
        <div class="thread-wrap" id="threadWrap">
          <div class="thread" id="thread"></div>
          <div class="thread-empty" id="threadEmpty">Mathii</div>
        </div>

        <div class="composer-wrap">
          <div class="composer">
            <div class="composer-inner">
              <textarea
                id="composerInput"
                class="composer-input"
                rows="1"
                placeholder="Describe a math concept to animate…"
              ></textarea>
              <button id="sendBtn" class="send-btn" type="button" aria-label="Send prompt">
                <svg class="send-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M5 12H18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                  <path d="M12 6L18 12L12 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span class="spinner" aria-hidden="true"></span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    const state = {
      mode: "landing",
      providers: [],
      currentPrompt: "",
      activeJobId: null,
      status: "idle",
      attempts: 0,
      renderTimeSeconds: 0,
      errorMessage: "",
      manimCode: "",
      videoUrl: "",
    };

    const activeAssistantRefs = {
      statusEl: null,
      metaEl: null,
      stageEl: null,
      errorEl: null,
      codeEl: null,
      codeDetailsEl: null,
      codeWrapperEl: null,
    };

    const composerInput = document.getElementById("composerInput");
    const sendBtn = document.getElementById("sendBtn");
    const providerEl = document.getElementById("provider");
    const qualityEl = document.getElementById("quality");
    const providerHintEl = document.getElementById("providerHint");
    const threadEl = document.getElementById("thread");
    const threadWrapEl = document.getElementById("threadWrap");
    const threadEmptyEl = document.getElementById("threadEmpty");
    const newAnimationBtn = document.getElementById("newAnimationBtn");

    const statusLabels = {
      idle: "Idle",
      queued: "Queued",
      generating: "Generating…",
      rendering: "Rendering…",
      done: "Done",
      failed: "Failed",
    };

    const qualityLabels = {
      l: "Fast",
      m: "Balanced",
      h: "Deep",
    };

    function truncateError(message) {
      return (message || "")
        .split("\n")
        .filter(Boolean)
        .slice(0, 3)
        .join("\n");
    }

    function scrollThreadToBottom() {
      requestAnimationFrame(() => {
        threadWrapEl.scrollTop = threadWrapEl.scrollHeight;
      });
    }

    function autoResize(textarea) {
      textarea.style.height = "auto";
      textarea.style.height = `${Math.min(textarea.scrollHeight, 200)}px`;
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function setThreadEmptyState() {
      threadEmptyEl.classList.toggle("hidden", threadEl.children.length > 0);
    }

    function setBusy(isBusy) {
      sendBtn.disabled = isBusy || !state.providers.length;
      sendBtn.classList.toggle("loading", isBusy);
      providerEl.disabled = isBusy || !state.providers.length;
      qualityEl.disabled = isBusy;
      composerInput.disabled = false;
    }

    function buildMetaChips() {
      const model = providerEl.value || "-";
      const quality = qualityLabels[qualityEl.value] || qualityEl.value;
      return [
        `model ${model}`,
        `quality ${quality}`,
        `attempts ${state.attempts} / 3`,
        `time ${(state.renderTimeSeconds || 0).toFixed(1)}s`,
      ];
    }

    function renderMetaRow(metaEl) {
      metaEl.innerHTML = "";
      buildMetaChips().forEach((label) => {
        const chip = document.createElement("span");
        chip.className = "meta-chip";
        chip.textContent = label;
        metaEl.appendChild(chip);
      });
    }

    function appendUserBubble(prompt) {
      const row = document.createElement("div");
      row.className = "message-row user";

      const bubble = document.createElement("div");
      bubble.className = "user-bubble";
      bubble.textContent = prompt;

      row.appendChild(bubble);
      threadEl.appendChild(row);
      setThreadEmptyState();
      scrollThreadToBottom();
    }

    function createStatusLine(status) {
      const line = document.createElement("div");
      line.className = "status-line";

      const pulse = document.createElement("span");
      pulse.className = "status-pulse";
      pulse.innerHTML = "<span></span><span></span><span></span>";
      if (status === "done" || status === "failed") {
        pulse.classList.add("hidden");
      }

      const label = document.createElement("span");
      label.textContent = statusLabels[status] || status;

      line.appendChild(pulse);
      line.appendChild(label);

      return { line, pulse, label };
    }

    function appendAssistantBubble() {
      const row = document.createElement("div");
      row.className = "message-row assistant";

      const shell = document.createElement("div");
      shell.className = "assistant-shell";

      const avatar = document.createElement("div");
      avatar.className = "assistant-avatar";
      avatar.textContent = "M";

      const bubble = document.createElement("div");
      bubble.className = "assistant-bubble";

      const status = createStatusLine("queued");
      const meta = document.createElement("div");
      meta.className = "meta-row";

      const stage = document.createElement("div");
      stage.className = "preview-card placeholder";
      stage.textContent = "Preparing animation…";

      const error = document.createElement("div");
      error.className = "inline-error";

      const detailsWrap = document.createElement("div");
      detailsWrap.className = "assistant-details hidden";

      const details = document.createElement("details");
      details.hidden = true;

      const summary = document.createElement("summary");
      summary.textContent = "Generated Code";

      const pre = document.createElement("pre");
      const code = document.createElement("code");
      code.className = "language-python";
      pre.appendChild(code);
      details.appendChild(summary);
      details.appendChild(pre);
      detailsWrap.appendChild(details);

      bubble.appendChild(status.line);
      bubble.appendChild(meta);
      bubble.appendChild(stage);
      bubble.appendChild(error);
      bubble.appendChild(detailsWrap);

      shell.appendChild(avatar);
      shell.appendChild(bubble);
      row.appendChild(shell);
      threadEl.appendChild(row);

      setThreadEmptyState();
      scrollThreadToBottom();

      return {
        statusEl: status.label,
        pulseEl: status.pulse,
        metaEl: meta,
        stageEl: stage,
        errorEl: error,
        codeEl: code,
        codeDetailsEl: details,
        codeWrapperEl: detailsWrap,
      };
    }

    function resetAssistantRefs() {
      activeAssistantRefs.statusEl = null;
      activeAssistantRefs.pulseEl = null;
      activeAssistantRefs.metaEl = null;
      activeAssistantRefs.stageEl = null;
      activeAssistantRefs.errorEl = null;
      activeAssistantRefs.codeEl = null;
      activeAssistantRefs.codeDetailsEl = null;
      activeAssistantRefs.codeWrapperEl = null;
    }

    function resetStateForRun(prompt) {
      state.currentPrompt = prompt;
      state.activeJobId = null;
      state.status = "queued";
      state.attempts = 0;
      state.renderTimeSeconds = 0;
      state.errorMessage = "";
      state.manimCode = "";
      state.videoUrl = "";
      state.mode = "result";
    }

    function renderAssistantState(data = {}) {
      if (!activeAssistantRefs.statusEl) {
        return;
      }

      if (typeof data.status === "string") {
        state.status = data.status;
      }

      state.attempts = data.attempts ?? state.attempts;
      state.renderTimeSeconds = data.render_time_seconds ?? state.renderTimeSeconds;
      state.errorMessage = data.error_message ?? state.errorMessage;
      state.manimCode = data.manim_code ?? state.manimCode;
      state.videoUrl = data.video_url ?? state.videoUrl;

      activeAssistantRefs.statusEl.textContent = statusLabels[state.status] || state.status;
      activeAssistantRefs.pulseEl.classList.toggle("hidden", state.status === "done" || state.status === "failed");
      renderMetaRow(activeAssistantRefs.metaEl);

      if (state.videoUrl) {
        activeAssistantRefs.stageEl.className = "preview-card";
        activeAssistantRefs.stageEl.innerHTML = "";

        const video = document.createElement("video");
        video.src = state.videoUrl || `/api/video/${state.activeJobId}`;
        video.controls = true;
        video.autoplay = true;
        video.muted = true;
        video.playsInline = true;
        activeAssistantRefs.stageEl.appendChild(video);
      } else if (state.status === "failed") {
        activeAssistantRefs.stageEl.className = "preview-card placeholder";
        activeAssistantRefs.stageEl.textContent = "Animation unavailable";
      } else if (state.status === "rendering") {
        activeAssistantRefs.stageEl.className = "preview-card placeholder";
        activeAssistantRefs.stageEl.textContent = "Rendering preview…";
      } else if (state.status === "generating") {
        activeAssistantRefs.stageEl.className = "preview-card placeholder";
        activeAssistantRefs.stageEl.textContent = "Generating scene…";
      }

      if (state.errorMessage) {
        activeAssistantRefs.errorEl.style.display = "block";
        activeAssistantRefs.errorEl.textContent = truncateError(state.errorMessage);
      } else {
        activeAssistantRefs.errorEl.style.display = "none";
        activeAssistantRefs.errorEl.textContent = "";
      }

      if (state.manimCode) {
        activeAssistantRefs.codeWrapperEl.classList.remove("hidden");
        activeAssistantRefs.codeDetailsEl.hidden = false;
        activeAssistantRefs.codeEl.textContent = state.manimCode;
        hljs.highlightElement(activeAssistantRefs.codeEl);
      }

      scrollThreadToBottom();
    }

    function clearThread() {
      threadEl.innerHTML = "";
      resetAssistantRefs();
      state.currentPrompt = "";
      state.activeJobId = null;
      state.status = "idle";
      state.attempts = 0;
      state.renderTimeSeconds = 0;
      state.errorMessage = "";
      state.manimCode = "";
      state.videoUrl = "";
      state.mode = "landing";
      composerInput.value = "";
      autoResize(composerInput);
      setThreadEmptyState();
      composerInput.focus();
    }

    async function loadProviders() {
      const response = await fetch("/api/providers");
      const data = await response.json();

      state.providers = data.providers || [];
      providerEl.innerHTML = "";

      if (!state.providers.length) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "No models";
        providerEl.appendChild(option);
        providerEl.disabled = true;
        sendBtn.disabled = true;
        providerHintEl.textContent = "No providers configured";
        return;
      }

      state.providers.forEach((provider) => {
        const option = document.createElement("option");
        option.value = provider;
        option.textContent = provider;
        providerEl.appendChild(option);
      });

      providerEl.disabled = false;
      sendBtn.disabled = false;
      providerHintEl.textContent = `${state.providers.length} model${state.providers.length > 1 ? "s" : ""} available`;
    }

    async function pollStatus(jobId) {
      while (state.activeJobId === jobId) {
        const response = await fetch(`/api/status/${jobId}`);
        const data = await response.json();

        renderAssistantState(data);

        if (data.status === "failed" || data.status === "done") {
          setBusy(false);
          return;
        }

        await new Promise((resolve) => setTimeout(resolve, 1200));
      }
    }

    async function submitPrompt() {
      const prompt = composerInput.value.trim();
      if (prompt.length < 10) {
        if (!activeAssistantRefs.errorEl) {
          appendUserBubble(prompt || " ");
          Object.assign(activeAssistantRefs, appendAssistantBubble());
        }
        state.errorMessage = "Prompt must be at least 10 characters.";
        state.status = "failed";
        renderAssistantState({ status: "failed", error_message: state.errorMessage });
        return;
      }

      appendUserBubble(prompt);
      resetStateForRun(prompt);
      Object.assign(activeAssistantRefs, appendAssistantBubble());
      renderAssistantState({ status: "queued" });
      setBusy(true);

      const response = await fetch("/api/generate-async", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          prompt,
          provider: providerEl.value || null,
          quality: qualityEl.value,
        }),
      });

      if (!response.ok) {
        const message = await response.text();
        renderAssistantState({
          status: "failed",
          error_message: message,
        });
        setBusy(false);
        return;
      }

      composerInput.value = "";
      autoResize(composerInput);

      const job = await response.json();
      state.activeJobId = job.job_id;
      renderAssistantState({ status: job.status || "queued" });
      await pollStatus(job.job_id);
    }

    sendBtn.addEventListener("click", async () => {
      await submitPrompt();
    });

    composerInput.addEventListener("input", () => {
      autoResize(composerInput);
    });

    composerInput.addEventListener("keydown", async (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        await submitPrompt();
      }
    });

    newAnimationBtn.addEventListener("click", () => {
      clearThread();
    });

    loadProviders().catch((error) => {
      providerHintEl.textContent = "Failed to load models";
      appendUserBubble(" ");
      Object.assign(activeAssistantRefs, appendAssistantBubble());
      renderAssistantState({
        status: "failed",
        error_message: error.message,
      });
      setBusy(false);
    });

    autoResize(composerInput);
    setThreadEmptyState();
    composerInput.focus();
  </script>
</body>
</html>
